<!-- block preview -->
{%- if page and (page.next_page or page.previous_page) %}
<sb-prev-next
    id="component-preview"
    {% if page.previous_page %}prev-href="{{ page.previous_page.url|url }}" prev-label="Previous"{% endif %}
    {% if page.next_page %}next-href="{{ page.next_page.url|url }}" next-label="Next"{% endif %}
></sb-prev-next>
{%- endif %}
<!-- endblock -->
