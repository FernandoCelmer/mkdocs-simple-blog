name: Review Issue

on:
  issues:
    types: [opened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Review and comment on issue
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const { issue, repository } = context.payload;

            const availableLabels = [
              'bug', 'documentation', 'duplicate', 'enhancement',
              'good first issue', 'help wanted', 'invalid', 'question',
              'wontfix', 'feature', 'feature-request', 'needs-triage', 'WIP'
            ];

            const prompt = `You are a project maintainer reviewing a GitHub issue. Analyze the issue below and produce:

            1. A structured review in English with the following sections:

            ## Issue Review: ${issue.title}

            **Summary**
            One paragraph describing what is being requested or reported.

            **Analysis**
            - Relevance: (High/Medium/Low) and why
            - Complexity: (High/Medium/Low) and why
            - Status: current state and any context

            **Implementation Options**
            List 2–4 concrete options with trade-offs.

            **Recommendation**
            The preferred approach and why.

            2. At the very end, on a new line, output ONLY a JSON array of labels to apply from this list: ${JSON.stringify(availableLabels)}
            Format: LABELS: ["label1", "label2"]

            ---

            Issue title: ${issue.title}
            Issue body:
            ${issue.body || '(no description provided)'}
            `;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 1024,
                messages: [{ role: 'user', content: prompt }],
              }),
            });

            const data = await response.json();

            if (!response.ok || !data.content || !data.content[0]) {
              throw new Error(`Anthropic API error: ${JSON.stringify(data)}`);
            }

            const fullText = data.content[0].text;

            // Extract labels from response
            const labelsMatch = fullText.match(/LABELS:\s*(\[.*?\])/s);
            const labels = labelsMatch ? JSON.parse(labelsMatch[1]) : ['needs-triage'];

            // Strip the LABELS line from the comment
            const review = fullText.replace(/LABELS:\s*\[.*?\]/s, '').trim();

            // Post comment
            await github.rest.issues.createComment({
              owner: repository.owner.login,
              repo: repository.name,
              issue_number: issue.number,
              body: review,
            });

            // Apply labels
            await github.rest.issues.addLabels({
              owner: repository.owner.login,
              repo: repository.name,
              issue_number: issue.number,
              labels: labels,
            });
